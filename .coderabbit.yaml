# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for xycld/pi-cursor, preserving upstream OpenCode review rules.
# This file MUST remain tracked; do not add it to .gitignore.

language: en

reviews:
  profile: chill
  request_changes_workflow: false
  review_status: true
  commit_status: true
  fail_commit_status: false
  high_level_summary: false
  poem: false
  auto_summary: false

  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!package-lock.json"
    - "!bun.lock"
    - "!cmd/installer/installer-binary"
    - "!installer"

  path_instructions:
    - path: "src/auth.ts"
      instructions: |
        Never log or persist raw credentials. Prefer env-var lookup over defaults.
    - path: "src/proxy/**/*.ts"
      instructions: |
        Ensure streaming errors propagate and streams are destroyed on error.
    - path: "src/tools/**/*.ts"
      instructions: |
        Validate inputs and add unit tests for new tools.
    - path: "cmd/**/*.go"
      instructions: |
        Handle context cancellation and return non-zero exit codes on fatal errors.
    - path: "pi-extension/**/*.ts"
      instructions: |
        Never log or persist raw credentials. Keep Cursor authentication delegated to cursor-agent.
    - path: "bin/**/*.js"
      instructions: |
        Preserve backups before changing user config files and keep installer operations idempotent.

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main
    ignore_title_keywords:
      - "[skip review]"
      - "[wip]"

  tools:
    eslint:
      enabled: false
    prettier:
      enabled: false

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false

chat:
  auto_reply: true
