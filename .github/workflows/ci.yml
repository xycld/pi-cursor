name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - run: npm install
      - run: npm run verify

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Pi Cursor package"
            echo "- Status: \`${{ job.status }}\`"
            echo "- Command: \`npm run verify\`"
          } >> "$GITHUB_STEP_SUMMARY"
